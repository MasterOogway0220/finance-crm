appId: in.kesarsecurities.crm
productName: Kesar Securities CRM
copyright: Copyright © 2026 Kesar Securities

directories:
  output: dist

files:
  - main.js
  - preload.js
  - "assets/**/*"
  - package.json

win:
  target:
    - target: nsis
      arch:
        - x64
  # icon: assets/icon.ico  # Uncomment once you add your logo at electron-app/assets/icon.ico

nsis:
  oneClick: false
  allowToChangeInstallationDirectory: false
  allowElevation: false
  createDesktopShortcut: true
  createStartMenuShortcut: true
  # installerIcon: assets/icon.ico  # Uncomment once you add your logo
  # uninstallerIcon: assets/icon.ico

publish:
  provider: github
  owner: GITHUB_OWNER  # Replace in Task 8 with your GitHub username
  repo: GITHUB_REPO    # Replace in Task 8 with your GitHub repository name
